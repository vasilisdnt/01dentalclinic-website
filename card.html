<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <title>OI Dental Clinic</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --font: 'Josefin Sans', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: var(--font);
      overflow: hidden;
    }

    .wrapper {
      width: 100%; height: 100vh;
      height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(3rem, 10vh, 6rem);
      opacity: 0;
      animation: pageFadeIn 1.2s ease forwards;
      animation-delay: 0.3s;
    }

    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-img {
      width: clamp(200px, 28vw, 340px);
      height: auto;
      display: block;
      transform: scale(2.08);
      transform-origin: center center;
      mix-blend-mode: lighten;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(2rem, 5.5vh, 3.5rem);
    }

    .card-btn {
      display: block;
      font-family: var(--font);
      font-size: clamp(1rem, 2vw, 1.3rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
      text-decoration: none;
      transition: opacity 0.25s ease;
    }
    .card-btn:hover { opacity: 0.75; }
  </style>
</head>
<body>

<div class="wrapper">
  <img class="logo-img" src="logo.jpg" alt="OI Dental Clinic" />
  <div class="buttons">
    <a href="request.html" class="card-btn">REQUEST APPOINTMENT</a>
    <a href="contact.html" class="card-btn">CONTACT</a>
  </div>
</div>

</body>
</html>
