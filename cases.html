<script>
  let dropdownOpen = false;
  function toggleDropdown() {
    dropdownOpen = !dropdownOpen;
    document.getElementById('treatments-dropdown').classList.toggle('open', dropdownOpen);
  }
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.nav-item')) {
      dropdownOpen = false;
      document.getElementById('treatments-dropdown').classList.remove('open');
    }
  });
  function initCarousels() {
    const carousels = Array.from(document.querySelectorAll('[data-carousel]'));

    carousels.forEach(function(carousel) {
      const track = carousel.querySelector('[data-carousel-track]');
      const dots = Array.from(carousel.querySelectorAll('.treatment-carousel-dot'));
      const slides = Array.from(carousel.querySelectorAll('.treatment-carousel-slide'));
      if (!track || slides.length === 0) return;

      let playing = false;

      function goTo(index, behavior) {
        track.scrollTo({ left: index * track.clientWidth, behavior: behavior || 'smooth' });
        dots.forEach(function(dot, i) { dot.classList.toggle('active', i === index); });
      }

      function playOnce() {
        if (playing) return;
        playing = true;
        setTimeout(function() { goTo(1); }, 80);
        setTimeout(function() { goTo(2); }, 1600);
        setTimeout(function() { goTo(0); playing = false; }, 3200);
      }

      slides[0].style.cursor = 'pointer';
      slides[0].addEventListener('click', function() { playOnce(); });

      track.addEventListener('scroll', function() {
        const slideWidth = track.clientWidth || 1;
        const index = Math.max(0, Math.min(slides.length - 1, Math.round(track.scrollLeft / slideWidth)));
        dots.forEach(function(dot, i) { dot.classList.toggle('active', i === index); });
      }, { passive: true });

      goTo(0, 'auto');
    });

    window.addEventListener('resize', function() {
      carousels.forEach(function(carousel) {
        const track = carousel.querySelector('[data-carousel-track]');
        if (track) track.scrollTo({ left: 0, behavior: 'auto' });
      });
    });
  }
  initCarousels();
</script>
